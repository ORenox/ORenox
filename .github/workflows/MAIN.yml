name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install dependencies (optional)
        run: |
          # no obligatorio, pero por si la action lo necesita
          echo "No dependencies required"

      - name: Generate snake animation
        uses: Platane/snk@master
        id: gen_snake
        with:
          github_user_name: ORenox
          gif_out_path: dist/github-contribution-grid-snake.gif
          svg_out_path: dist/github-contribution-grid-snake.svg

      - name: Show generated files (debug)
        run: |
          echo "Listing dist folder:"
          ls -la dist || echo "dist not found"

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch -c output || git switch output
          mkdir -p dist
          git add dist || true
          git commit -m "chore: update snake outputs" || echo "no changes to commit"

      - name: Push output branch
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: output
          force: true
